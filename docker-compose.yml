services:
  backend:
    build: ./backend
    container_name: contacto-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - ./ContactoUshuaia/.env
    restart: unless-stopped
  frontend:
    build: ./frontend
    container_name: contacto-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

